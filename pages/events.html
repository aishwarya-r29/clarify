<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clarify · Events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../logo.svg" />
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <div class="page-wrapper">
      <header class="navbar">
        <div class="navbar-left">
          <div class="navbar-logo"><span>C</span></div>
          <div class="navbar-title">
            <span class="navbar-title-main">Clarify</span>
            <span class="navbar-title-sub">PSG Tech community hub</span>
          </div>
        </div>
        <button id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
        <nav id="nav-links" class="nav-links">
          <a data-nav-link href="./home.html" class="nav-link">Home</a>
          <a data-nav-link href="./ask.html" class="nav-link">Ask</a>
          <a data-nav-link href="./resources.html" class="nav-link">Resources</a>
          <a data-nav-link href="./events.html" class="nav-link">Events</a>
          <a data-nav-link href="./profile.html" class="nav-link">Profile</a>
          <button id="logout-btn" class="nav-link nav-logout" type="button">Logout</button>
        </nav>
      </header>

      <main class="main-content">
        <div class="page-heading">
          <div>
            <h1>Campus events</h1>
            <p>Hackathons, workshops, club meets and more happening around you.</p>
          </div>
          <div class="chip">
            <span class="chip-label">Calendar</span>
            <span>Stay in the loop.</span>
          </div>
        </div>

        <!-- Publish Event Form -->
        <section class="card" id="event-form">
          <h2 class="section-title">Share an event</h2>

          <div class="form-group">
            <label class="form-label" for="ev-name">Event name</label>
            <input id="ev-name" type="text" placeholder="Hackathon, workshop, webinar, ..." />
          </div>

          <div class="form-group">
            <label class="form-label" for="ev-date">Date & time</label>
            <input id="ev-date" type="datetime-local" />
          </div>

          <div class="form-group">
            <label class="form-label" for="ev-desc">Description</label>
            <textarea id="ev-desc" placeholder="What is this about? Who can join? Any prerequisites?"></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="ev-link">Register link (optional)</label>
            <input id="ev-link" type="url" placeholder="Google form / club site link" />
          </div>

          <div class="form-group">
            <label class="form-label" for="event-location">Location (optional)</label>
            <input id="event-location" type="text" placeholder="Room, building, or online link" />
          </div>

          <div class="form-group">
            <label class="form-label" for="event-tag">Tag (optional)</label>
            <input id="event-tag" type="text" placeholder="Workshop, Hackathon, Club Meet..." />
          </div>

          <div style="display: flex; justify-content: flex-end;">
            <button id="ev-btn" type="button">Publish event</button>
          </div>
        </section>

        <!-- Upcoming Events Section -->
        <section class="section">
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.75rem;">
              <h2 class="section-title" style="margin: 0;">Upcoming events</h2>
              <input
                type="text"
                id="ev-search"
                placeholder="Search by tag, name or department..."
                style="max-width: 320px; flex: 1;"
              />
            </div>
          </div>
          <div id="events-list"></div>
        </section>
      </main>

      <footer class="footer">
        <div>
          <span>Clarify</span> · PSG College of Technology · Built for students.
        </div>
      </footer>
    </div>

    <script type="module" src="../js/supabaseClient.js"></script>
    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/events.js"></script>
  </body>
</html>
